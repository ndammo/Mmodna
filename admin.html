<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DNA MMO — Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c15;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-bottom: 70px;
        }

        .admin-header {
            background: #0d1120;
            border-bottom: 1px solid #1e2d4a;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-header h1 {
            font-size: 18px;
            color: #a855f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .metrics-bar {
            display: flex;
            gap: 20px;
            padding: 10px 16px;
            background: #0d1120;
            border-bottom: 1px solid #1e2d4a;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .metric-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 12px;
        }

        .metric-label {
            color: #94a3b8;
        }

        .metric-value {
            font-weight: 700;
            color: #a855f7;
            font-size: 18px;
        }

        .metric-value.zero {
            color: #22c55e;
        }
        
        .metric-value.error {
            color: #ef4444;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0d1120;
            border-top: 1px solid #1e2d4a;
            display: flex;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #4a5568;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            color: #a855f7;
        }

        .main-content {
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
        }

        .stat-card h3 {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
        }

        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #1e2d4a;
        }

        th {
            color: #94a3b8;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            color: white;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button.danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        button.warning {
            background: linear-gradient(135deg, #d97706, #f59e0b);
        }

        button.secondary {
            background: #1e2d4a;
        }

        button.success {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }

        input, select, textarea {
            background: #0d1120;
            border: 1px solid #1e2d4a;
            border-radius: 8px;
            padding: 8px 10px;
            color: #e2e8f0;
            font-size: 13px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #a855f7;
        }

        .modal-content h4 {
            margin: 16px 0 8px;
            color: #e2e8f0;
            font-size: 13px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 1100;
            animation: fadeInOut 2s ease;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .spinner {
            text-align: center;
            padding: 40px;
            color: #4a5568;
        }

        .user-card, .log-card, .market-log-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .search-bar input {
            flex: 2;
            min-width: 150px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .rarity-common { color: #94a3b8; }
        .rarity-uncommon { color: #22c55e; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f59e0b; }
        .rarity-mythic { color: #ef4444; }

        .badge-active { background: #22c55e22; color: #22c55e; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .badge-inactive { background: #ef444422; color: #ef4444; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        
        .inventory-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .inventory-item { background: #0d1120; border-radius: 8px; padding: 4px 8px; font-size: 11px; }
        
        .log-entry { font-size: 11px; padding: 8px 0; border-bottom: 1px solid #1e2d4a; font-family: monospace; }
        
        .sale-history-item {
            background: #0d1120;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        .sale-history-item:hover {
            background: #1a2538;
        }
        
        .creature-icon-preview {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #0d1120;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .creature-icon-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            border-radius: 8px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .button-row input {
            flex: 1;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    
        /* ── ARENA TAB STYLES ─────────────────────────────── */
        .arena-stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        @media (min-width: 600px) { .arena-stats-grid { grid-template-columns: repeat(4, 1fr); } }

        .arena-league-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }
        .league-bronze  { background: #cd7c3a22; color: #cd7c3a; }
        .league-silver  { background: #94a3b822; color: #94a3b8; }
        .league-gold    { background: #f59e0b22; color: #f59e0b; }
        .league-platinum{ background: #a855f722; color: #a855f7; }
        .league-diamond { background: #06b6d422; color: #06b6d4; }

        .battle-row { transition: background 0.15s; }
        .battle-row:hover { background: #1a2538; }

        .arena-filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            align-items: center;
        }
        .arena-filter-bar select { max-width: 140px; }

        .battle-status-waiting    { color: #94a3b8; }
        .battle-status-pending    { color: #f59e0b; }
        .battle-status-active     { color: #22c55e; }
        .battle-status-finished   { color: #a855f7; }
        .battle-status-expired,
        .battle-status-cancelled  { color: #ef4444; }

        .mini-team {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .mini-creature {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 6px;
            background: #0d1120;
        }
        .arena-section-title {
            font-size: 13px;
            color: #a855f7;
            font-weight: 700;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rating-bar-wrap {
            background: #1e2d4a;
            border-radius: 4px;
            height: 4px;
            width: 80px;
            display: inline-block;
            vertical-align: middle;
        }
        .rating-bar-fill {
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            border-radius: 4px;
            height: 4px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-top">
        <h1><i class="fas fa-dna"></i> DNA MMO Admin</h1>
    </div>
</div>

<div class="metrics-bar" id="metricsBar">
    <div class="metric-item"><span class="metric-label">📡 Запросов/мин</span><span class="metric-value" id="reqCount">0</span></div>
    <div class="metric-item"><span class="metric-label">⚠️ Ошибок 5xx</span><span class="metric-value zero" id="errorRate">0.000%</span></div>
    <div class="metric-item"><span class="metric-label">⏱️ Аптайм</span><span class="metric-value" id="uptime">0</span></div>
    <div class="metric-item"><span class="metric-label">🖥️ RAM</span><span class="metric-value" id="ramUsage">0 MB</span></div>
</div>

<div class="main-content" id="mainContent">
    <div class="spinner">Загрузка...</div>
</div>

<div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Обзор</span></button>
    <button class="nav-item" data-tab="users"><i class="fas fa-users"></i><span>Пользователи</span></button>
    <button class="nav-item" data-tab="transactions"><i class="fas fa-exchange-alt"></i><span>Заявки</span></button>
    <button class="nav-item" data-tab="market"><i class="fas fa-store"></i><span>Маркет</span></button>
    <button class="nav-item" data-tab="ads"><i class="fas fa-tv"></i><span>Реклама</span></button>
    <button class="nav-item" data-tab="creatures"><i class="fas fa-paw"></i><span>Существа</span></button>
    <button class="nav-item" data-tab="quests"><i class="fas fa-star"></i><span>Квесты</span></button>
    <button class="nav-item" data-tab="broadcast"><i class="fas fa-bullhorn"></i><span>Рассылка</span></button>
    <button class="nav-item" data-tab="arena" id="navArena" style="display:none"><i class="fas fa-fist-raised"></i><span>Арена</span></button>
</div>

<script>
    // ============================================================
    // CONFIG
    // ============================================================
    const API_URL = 'https://serv-production-dbf3.up.railway.app';
    let adminToken = localStorage.getItem('admin_session_token');
    let creaturesList = [];
    let currentPage = 1;
    let totalUsers = 0;
    let metricsInterval = null;
    let isRefreshing = false;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function apiRequest(path, method = 'GET', body = null) {
        const opts = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'X-Admin-Token': adminToken || ''
            }
        };
        if (body) opts.body = JSON.stringify(body);

        try {
            const res = await fetch(API_URL + path, opts);
            const data = await res.json();
            
            if (res.status === 401) {
                if (!path.includes('/metrics')) {
                    localStorage.removeItem('admin_session_token');
                    adminToken = null;
                    showToast('Сессия истекла, войдите снова', 'error');
                    showLoginModal();
                    if (metricsInterval) clearInterval(metricsInterval);
                }
                return null;
            }
            
            if (!res.ok) {
                console.warn(`API ${path} error:`, data.message);
                return data;
            }
            return data;
        } catch (e) {
            if (e.name !== 'AbortError') {
                console.error(`API ${path} error:`, e.message);
            }
            return null;
        }
    }

    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type === 'error' ? 'error' : '');
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function showLoginModal() {
        const oldModal = document.getElementById('loginModal');
        if (oldModal) oldModal.remove();
        
        const modalHtml = `
            <div class="modal" id="loginModal">
                <div class="modal-content">
                    <h3>🔐 Вход в админ-панель</h3>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="adminLogin" placeholder="Введите логин" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="adminPassword" placeholder="Введите пароль">
                    </div>
                    <div class="modal-buttons">
                        <button onclick="adminLogin()">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.adminLogin = async function() {
        const login = document.getElementById('adminLogin').value;
        const password = document.getElementById('adminPassword').value;
        
        if (!login || !password) {
            showToast('Введите логин и пароль', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                adminToken = data.token;
                localStorage.setItem('admin_session_token', adminToken);
                document.getElementById('loginModal')?.remove();
                loadDashboard();
                startRealMetrics();
                showToast('Добро пожаловать в админ-панель!', 'success');
            } else {
                showToast(data.message || 'Ошибка входа', 'error');
            }
        } catch (e) {
            showToast('Ошибка соединения', 'error');
        }
    };

    // ============================================================
    // РЕАЛЬНЫЕ МЕТРИКИ
    // ============================================================
    async function fetchRealMetrics() {
        const res = await apiRequest('/api/admin/metrics');
        if (res && res.success) {
            document.getElementById('reqCount').innerText = res.requestsLastMinute || 0;
            
            const hours = Math.floor(res.uptime / 3600);
            const minutes = Math.floor((res.uptime % 3600) / 60);
            const seconds = res.uptime % 60;
            document.getElementById('uptime').innerHTML = `${hours}ч ${minutes}м ${seconds}с`;
            
            const errorRate = res.errorRate5xx || 0;
            const errSpan = document.getElementById('errorRate');
            errSpan.innerText = errorRate.toFixed(3) + '%';
            if (errorRate > 1) {
                errSpan.classList.add('error');
                errSpan.classList.remove('zero');
            } else if (errorRate > 0) {
                errSpan.classList.remove('error', 'zero');
            } else {
                errSpan.classList.add('zero');
                errSpan.classList.remove('error');
            }
            
            const ram = res.memoryUsage || 0;
            document.getElementById('ramUsage').innerText = ram + ' MB';
        }
    }

    function startRealMetrics() {
        if (metricsInterval) clearInterval(metricsInterval);
        fetchRealMetrics();
        metricsInterval = setInterval(fetchRealMetrics, 30000);
    }

    function formatNum(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return Math.floor(n).toString();
    }

    window.closeModal = function() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
    };

    // ============================================================
    // НАВИГАЦИЯ
    // ============================================================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            if (tab === 'dashboard') loadDashboard();
            if (tab === 'users') loadUsers(1);
            if (tab === 'transactions') loadTransactions();
            if (tab === 'market') loadMarketSection();
            if (tab === 'ads') loadAdsPanel();
            if (tab === 'creatures') loadCreatures();
            if (tab === 'quests') loadSpecialQuests();
            if (tab === 'broadcast') loadBroadcastTab();
            if (tab === 'arena') loadArenaTab();
        });
    });

    // ============================================================
    // DASHBOARD
    // ============================================================
    async function loadDashboard() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const statsRes = await apiRequest('/api/admin/stats');
        if (!statsRes) {
            main.innerHTML = '<div class="spinner">Ошибка загрузки статистики</div>';
            return;
        }
        
        const stats = statsRes.stats;
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Всего игроков</h3><div class="value">${stats.totalUsers}</div></div>
                <div class="stat-card"><h3>Активные сегодня</h3><div class="value">${stats.activeToday}</div></div>
                <div class="stat-card"><h3>Новых за 7 дней</h3><div class="value">${stats.newUsersLast7Days}</div></div>
                <div class="stat-card"><h3>Забанено</h3><div class="value">${stats.bannedUsers}</div></div>
                <div class="stat-card"><h3>Общий баланс</h3><div class="value">${formatNum(stats.totalBalance)} MMO</div></div>
                <div class="stat-card"><h3>Средний уровень</h3><div class="value">${stats.avgLevel.toFixed(1)}</div></div>
                <div class="stat-card"><h3>Всего слияний</h3><div class="value">${formatNum(stats.totalMerges)}</div></div>
                <div class="stat-card"><h3>Открыто капсул</h3><div class="value">${formatNum(stats.totalCapsules)}</div></div>
            </div>
            <div class="user-card">
                <h3>⚡ Быстрые действия</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;">
                    <button onclick="showGiveAllCoins()"><i class="fas fa-gift"></i> Выдать MMO всем</button>
                    <button onclick="showGiveAllCreature()"><i class="fas fa-paw"></i> Выдать существо всем</button>
                    <button class="secondary" onclick="refreshCache()"><i class="fas fa-sync"></i> Обновить кэш</button>
                    <button style="background: linear-gradient(135deg, #0369a1, #0ea5e9);" onclick="goToArenaTab()">⚔️ Арена</button>
                </div>
            </div>
        `;
        main.innerHTML = html;
    }

    // ============================================================
    // ПОЛЬЗОВАТЕЛИ
    // ============================================================
    let _lastUserSearch = '';

    async function loadUsers(page = 1) {
        currentPage = page;
        const main = document.getElementById('mainContent');
        
        const existingInput = document.getElementById('userSearch');
        if (existingInput) _lastUserSearch = existingInput.value;
        const search = _lastUserSearch;
        
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const skip = (page - 1) * 20;
        
        const res = await apiRequest(`/api/admin/users?limit=20&skip=${skip}&search=${encodeURIComponent(search)}`);
        if (!res) {
            main.innerHTML = '<div class="spinner">Ошибка загрузки пользователей</div>';
            return;
        }
        
        totalUsers = res.total || 0;
        
        if (creaturesList.length === 0) {
            const creaturesRes = await apiRequest('/api/admin/creatures');
            if (creaturesRes?.creatures) creaturesList = creaturesRes.creatures;
        }
        
        const html = `
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Поиск по ID, имени, username..." value="${escapeHtml(search)}" onkeydown="if(event.key==='Enter') searchUsers()">
                <button onclick="searchUsers()"><i class="fas fa-search"></i> Поиск</button>
                <button onclick="clearSearchAndReload()" class="secondary"><i class="fas fa-times"></i> Сброс</button>
            </div>
            <div class="data-table">
                <table style="width:100%">
                    <thead>

    window.changeBalance = async function(userId) {
        const amount = parseInt(document.getElementById('balanceAmount')?.value);
        if (isNaN(amount)) { showToast('Введите сумму', 'error'); return; }
        const res = await apiRequest(`/api/admin/users/${userId}/balance`, 'PUT', { amount, reason: 'Админ' });
        if (res?.success) { 
            showToast(`Баланс изменён на ${amount > 0 ? '+' : ''}${amount}`);
            closeModal();
            loadUsers(currentPage);
        } else {
            showToast(res?.message || 'Ошибка', 'error');
        }
    };

    window.giveItem = async function(userId) {
        const creatureId = document.getElementById('giveCreatureId')?.value;
        const count = parseInt(document.getElementById('giveCount')?.value || 1);
        if (!creatureId) { showToast('Выберите существо', 'error'); return; }
        if (count < 1) { showToast('Количество должно быть больше 0', 'error'); return; }
        
        const res = await apiRequest(`/api/admin/users/${userId}/give-item`, 'POST', { creatureId, count });
        if (res?.success) { 
            showToast(`Выдано ${count} ${creatureId}`);
            closeModal();
            loadUsers(currentPage);
        } else {
            showToast(res?.message || 'Ошибка выдачи', 'error');
        }
    };

    window.removeItem = async function(userId) {
        const creatureId = document.getElementById('removeCreatureId')?.value;
        const count = parseInt(document.getElementById('removeCount')?.value || 1);
        if (!creatureId) { showToast('Выберите существо', 'error'); return; }
        if (count < 1) { showToast('Количество должно быть больше 0', 'error'); return; }
        
        const res = await apiRequest(`/api/admin/users/${userId}/item`, 'DELETE', { creatureId, count });
        if (res?.success) { 
            showToast(`Удалено ${count} ${creatureId}`);
            closeModal();
            loadUsers(currentPage);
        } else {
            showToast(res?.message || 'Ошибка удаления', 'error');
        }
    };

            loadUsers(currentPage);

                        <h3><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки статистики рекламы</h3>

                <div class="stats-grid">

                    <h3><i class="fas fa-ranking-star"></i> Топ пользователей по просмотрам рекламы</h3>
                    <div class="data-table">
                        <table style="width:100%">

        .then(data => {
            const config = data.config || {};

            const adCooldown = config.adCooldown || 60;
            
            const modalHtml = `

                        <h3><i class="fas fa-tv"></i> Настройки рекламы</h3>

        })

            showToast('Ошибка загрузки настроек', 'error');
        });

    window.saveAdsConfig = async function() {
        const adReward = parseInt(document.getElementById('cfgAdReward')?.value);
        const adCooldown = parseInt(document.getElementById('cfgAdCooldown')?.value);
        
        if (isNaN(adReward) || adReward < 10) { 
            showToast('Награда должна быть минимум 10 MMO', 'error'); 
            return; 
        }
        if (isNaN(adCooldown) || adCooldown < 10) { 
            showToast('Кулдаун должен быть минимум 10 секунд', 'error'); 
            return; 
        }
        
        const res = await apiRequest('/api/admin/ads-config', 'PUT', { 
            adReward, 
            adCooldownSeconds: adCooldown 
        });
        
        if (res?.success) { 
            showToast('Настройки рекламы сохранены!'); 
            closeModal(); 
            loadAdsPanel(); 
        } else {
            showToast(res?.message || 'Ошибка сохранения', 'error');
        }
    };

    // ============================================================
    // РАССЫЛКА
    // ============================================================
    let buttonRows = 1;

    function addButtonRow() {
        if (buttonRows >= 3) {
            showToast('Максимум 3 кнопки', 'error');
            return;
        }
        
        const container = document.getElementById('buttonsContainer');
        const row = document.createElement('div');
        row.className = 'button-row';
        row.innerHTML = `
            <input type="text" placeholder="Текст кнопки" class="btn-text" style="flex: 1;">
            <input type="text" placeholder="URL ссылки" class="btn-url" style="flex: 2;">
            <button onclick="removeButtonRow(this)" class="danger" style="padding: 6px 12px;">✖</button>
        `;
        container.appendChild(row);
        buttonRows++;
    }

    function removeButtonRow(btn) {
        const row = btn.closest('.button-row');
        row.remove();
        buttonRows--;
    }

    function getButtons() {
        const buttons = [];
        const rows = document.querySelectorAll('#buttonsContainer .button-row');
        
        for (const row of rows) {
            const text = row.querySelector('.btn-text')?.value.trim();
            const url = row.querySelector('.btn-url')?.value.trim();
            
            if (text && url) {
                buttons.push({ text, url });
            }
        }
        
        return buttons;
    }

    async function sendBroadcast(testMode = false) {
        const message = document.getElementById('broadcastMessage')?.value.trim();
        const imageUrl = document.getElementById('broadcastImage')?.value.trim();
        const buttons = getButtons();
        
        if (!message) {
            showToast('Введите текст сообщения', 'error');
            return;
        }
        
        const confirmMsg = testMode 
            ? 'Отправить ТЕСТОВУЮ рассылку только АДМИНАМ?' 
            : `Отправить рассылку ВСЕМ ИГРОКАМ?\n\nЭто действие нельзя отменить!`;
        
        if (!confirm(confirmMsg)) return;
        
        showToast('Рассылка запущена...', 'info');
        
        const res = await apiRequest('/api/admin/broadcast/create', 'POST', {
            message,
            imageUrl: imageUrl || null,
            buttons,
            parseMode: 'HTML',
            testMode
        });
        
        if (res?.success) {
            showToast(res.message, 'success');
            document.getElementById('broadcastMessage').value = '';
            document.getElementById('broadcastImage').value = '';
            document.querySelectorAll('#buttonsContainer .button-row').forEach((row, idx) => {
                if (idx > 0) row.remove();
            });
            buttonRows = 1;
            loadBroadcastHistory();
        } else {
            showToast(res?.message || 'Ошибка', 'error');
        }
    }

    async function loadBroadcastHistory() {
        const container = document.getElementById('broadcastHistory');
        if (!container) return;
        
        const res = await apiRequest('/api/admin/broadcast/history');
        if (!res?.success) {
            container.innerHTML = '<div class="spinner">Ошибка загрузки</div>';
            return;
        }
        
        const broadcasts = res.broadcasts || [];
        
        if (broadcasts.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding: 20px; color: #4a5568;">Нет отправленных рассылок</div>';
            return;
        }
        
        container.innerHTML = broadcasts.map(b => {
            const statusColor = b.status === 'completed' ? '#22c55e' : b.status === 'pending' ? '#f59e0b' : '#ef4444';
            const statusText = b.status === 'completed' ? '✅ Завершена' : b.status === 'pending' ? '⏳ В процессе' : '❌ Отменена';
            const date = new Date(b.createdAt).toLocaleString();
            
            return `
                <div style="background: #0d1120; border: 1px solid #1e2d4a; border-radius: 12px; padding: 12px; margin-bottom: 12px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div>
                            <span style="color: ${statusColor}; font-weight: 700;">${statusText}</span>
                            <span style="color: #4a5568; font-size: 11px; margin-left: 8px;">#${b._id.slice(-8)}</span>
                        </div>
                        <div style="font-size: 11px; color: #4a5568;">${date}</div>
                    </div>
                    
                    <div style="font-size: 12px; color: #94a3b8; margin-bottom: 8px;">
                        <strong>Отправитель:</strong> ${escapeHtml(b.createdBy || 'admin')}
                    </div>
                    
                    <div style="background: #080b14; border-radius: 8px; padding: 8px; margin: 8px 0; font-size: 12px; max-height: 100px; overflow-y: auto;">
                        ${escapeHtml(b.message.substring(0, 200))}${b.message.length > 200 ? '...' : ''}
                    </div>
                    
                    <div style="display: flex; gap: 12px; font-size: 11px; margin-top: 8px;">
                        <div style="color: #22c55e;">✅ Отправлено: ${b.sentCount || 0}</div>
                        <div style="color: #ef4444;">❌ Ошибок: ${b.failedCount || 0}</div>
                        <div style="color: #a855f7;">👥 Всего: ${b.totalUsers || 0}</div>
                    </div>
                    
                    ${b.imageUrl ? `<div style="margin-top: 8px; font-size: 10px; color: #06b6d4;">🖼️ С изображением</div>` : ''}
                    ${b.buttons && b.buttons.length ? `<div style="margin-top: 8px; font-size: 10px; color: #f59e0b;">🔘 Кнопок: ${b.buttons.length}</div>` : ''}
                    
                    ${b.status === 'pending' ? `
                        <button onclick="cancelBroadcast('${b._id}')" class="danger" style="margin-top: 8px; padding: 4px 12px; font-size: 10px;">
                            <i class="fas fa-ban"></i> Отменить
                        </button>
                    ` : ''}
                </div>
            `;
        }).join('');
    }

    async function cancelBroadcast(broadcastId) {

        const res = await apiRequest(`/api/admin/broadcast/cancel/${broadcastId}`, 'POST');
        if (res?.success) {
            showToast('Рассылка отменена', 'success');
            loadBroadcastHistory();
        } else {
            showToast(res?.message || 'Ошибка', 'error');
        }
    }

                    </div>
                </div>
                
                <div class="form-group">
                    <label>🔘 Кнопки (до 3-х)</label>
                    <div id="buttonsContainer">
                        <div class="button-row">
                            <input type="text" placeholder="Текст кнопки" class="btn-text" style="flex: 1;">
                            <input type="text" placeholder="URL ссылки" class="btn-url" style="flex: 2;">
                            <button onclick="removeButtonRow(this)" class="danger" style="padding: 6px 12px;">✖</button>
                        </div>
                    </div>
                    <button onclick="addButtonRow()" class="secondary" style="margin-top: 8px;">
                        <i class="fas fa-plus"></i> Добавить кнопку
                    </button>
                </div>
                
                <div style="display: flex; gap: 12px; margin-top: 16px;">
                    <button onclick="sendBroadcast(false)" class="success" style="flex: 1;">
                        <i class="fas fa-paper-plane"></i> ОТПРАВИТЬ ВСЕМ
                    </button>
                    <button onclick="sendBroadcast(true)" class="warning" style="flex: 1;">
                        <i class="fas fa-flask"></i> ТЕСТ (только админам)
                    </button>
                </div>
            </div>
            
            <div class="user-card">
                <h3><i class="fas fa-history"></i> История рассылок</h3>
                <div id="broadcastHistory">
                    <div class="spinner">Загрузка...</div>
                </div>
            </div>
        `;
        
        loadBroadcastHistory();
    }

    window.refreshCache = async function() {
        showToast('Обновление кэша...', 'info');
        const res = await apiRequest('/api/admin/refresh-cache', 'POST');
        if (res?.success) {
            showToast('Кэш обновлён!');
            const activeTab = document.querySelector('.nav-item.active')?.dataset.tab;
            if (activeTab === 'ads') loadAdsPanel();
            if (activeTab === 'dashboard') loadDashboard();
            if (activeTab === 'users') loadUsers(currentPage);
        } else {
            showToast('Ошибка обновления кэша', 'error');
        }
    };

    // ============================================================
    // INIT
    // ============================================================
    if (!adminToken) {
        showLoginModal();
    } else {
        (async function checkAuth() {
            try {
                const res = await apiRequest('/api/admin/stats');
                if (res && res.success) {
                    loadDashboard();
                    startRealMetrics();
                    const creaturesRes = await apiRequest('/api/admin/creatures');
                    if (creaturesRes?.creatures) creaturesList = creaturesRes.creatures;
                } else if (res === null && !adminToken) {
                    showLoginModal();
                } else if (res === null) {
                    loadDashboard();
                    startRealMetrics();
                    showToast('Сервер временно недоступен', 'error');
                }
            } catch(e) {
                console.error('checkAuth error:', e);
                showLoginModal();
            }
        })();
    }

    // ============================================================
    // ARENA TAB
    // ============================================================

    // Переключение на вкладку арены из любого места
    window.goToArenaTab = function() {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        const arenaBtn = document.getElementById('navArena');
        if (arenaBtn) arenaBtn.classList.add('active');
        loadArenaTab();
    };

    const LEAGUE_NAMES = {
        bronze:   '🥉 Бронза',
        silver:   '🥈 Серебро',
        gold:     '🥇 Золото',
        platinum: '💎 Платина',
        diamond:  '🏆 Алмаз'
    };

    const LEAGUE_ENTRY = { bronze: 200, silver: 500, gold: 1000, platinum: 2000, diamond: 5000 };
    const LEAGUE_PRIZE = { bronze: 350, silver: 800, gold: 1600, platinum: 3200, diamond: 8000 };

    function leagueBadge(league) {
        return `<span class="arena-league-badge league-${league}">${LEAGUE_NAMES[league] || league}</span>`;
    }

    function statusLabel(status) {
        const map = {
            waiting:              ['battle-status-waiting',  '🔍 Поиск'],
            pending_confirmation: ['battle-status-pending',  '⏳ Подтверждение'],
            active:               ['battle-status-active',   '⚔️ Активный'],
            finished:             ['battle-status-finished', '✅ Завершён'],
            expired:              ['battle-status-expired',  '⌛ Истёк'],
            cancelled:            ['battle-status-cancelled','❌ Отменён'],
        };
        const [cls, label] = map[status] || ['', status];
        return `<span class="${cls}">${label}</span>`;
    }

    function miniTeam(team) {
        if (!team || !team.length) return '<span style="color:#4a5568;font-size:10px">—</span>';
        return '<div class="mini-team">' + team.map(p => {
            const src = p.icon && p.icon.startsWith('http') ? p.icon : '';
            const hp = p.maxHp ? Math.round(p.currentHp / p.maxHp * 100) : 0;
            const dead = !p.isAlive ? 'opacity:0.3;' : '';
            if (src) {
                return `<img class="mini-creature" src="${src}" title="${p.name} HP:${hp}%" style="${dead}" onerror="this.style.display='none'">`;
            }
            return `<span style="font-size:18px;${dead}" title="${p.name} HP:${hp}%">🧬</span>`;
        }).join('') + '</div>';
    }

    function fmtTime(dateStr) {
        if (!dateStr) return '—';
        const d = new Date(dateStr);
        return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit' }) + ' ' +
               d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    }

    function pName(p) {
        if (!p) return '<span style="color:#4a5568">—</span>';
        return p.username ? `@${p.username}` : (p.firstName || p.telegramId || '?');
    }

    async function loadArenaTab() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка арены...</div>';

        const [battlesRes, leaderRes] = await Promise.all([
            apiRequest('/api/admin/arena/battles'),
            apiRequest('/api/admin/arena/leaderboard')
        ]);

        let statsHtml = '';
        let battlesHtml = '';
        let leaderHtml = '';

        // ── СТАТИСТИКА ─────────────────────────────────────────
        if (battlesRes && battlesRes.stats) {
            const s = battlesRes.stats;
            statsHtml = `
            <div class="arena-stats-grid">
                <div class="stat-card"><h3>Активных боёв</h3><div class="value" style="color:#22c55e">${s.active || 0}</div></div>
                <div class="stat-card"><h3>В поиске</h3><div class="value" style="color:#f59e0b">${s.waiting || 0}</div></div>
                <div class="stat-card"><h3>Подтверждение</h3><div class="value" style="color:#38bdf8">${s.pending || 0}</div></div>
                <div class="stat-card"><h3>Завершено всего</h3><div class="value">${s.finished || 0}</div></div>
                <div class="stat-card"><h3>Боёв сегодня</h3><div class="value">${s.today || 0}</div></div>
                <div class="stat-card"><h3>Игроков с рейтингом</h3><div class="value">${s.totalRated || 0}</div></div>
                <div class="stat-card"><h3>Выплачено MMO</h3><div class="value">${(s.totalPaid || 0).toLocaleString()}</div></div>
                <div class="stat-card"><h3>Ср. ходов/бой</h3><div class="value">${s.avgTurns || 0}</div></div>
            </div>`;
        } else {
            statsHtml = '<div class="stat-card" style="margin-bottom:16px"><h3>Статистика</h3><div style="color:#4a5568;font-size:12px;margin-top:8px">Нет данных от сервера</div></div>';
        }

        // ── АКТИВНЫЕ / НЕДАВНИЕ БОИ ────────────────────────────
        if (battlesRes && battlesRes.battles && battlesRes.battles.length > 0) {
            const rows = battlesRes.battles.map(b => {
                const p1 = b.player1 || {};
                const p2 = b.player2 || {};
                const winner = b.winnerId ? (b.player1Id && b.winnerId === b.player1Id ? p1 : p2) : null;
                return `<tr class="battle-row">
                    <td style="font-size:10px;color:#4a5568;font-family:monospace">${b._id ? b._id.toString().slice(-6) : '?'}</td>
                    <td>${leagueBadge(b.league)}</td>
                    <td>${statusLabel(b.status)}</td>
                    <td style="font-size:11px">
                        <div>${pName(p1)}</div>
                        <div style="color:#4a5568">vs</div>
                        <div>${p2.telegramId ? pName(p2) : '<span style="color:#4a5568">ждёт...</span>'}</div>
                    </td>
                    <td>${miniTeam(b.player1Team)}</td>
                    <td>${miniTeam(b.player2Team)}</td>
                    <td style="font-size:11px;color:#f59e0b">${(b.prizePool || 0).toLocaleString()} <span style="color:#4a5568">MMO</span></td>
                    <td style="font-size:11px">${b.turnCount || 0}</td>
                    <td style="font-size:10px;color:#4a5568">${fmtTime(b.createdAt)}</td>
                    <td>${winner ? '<span style="color:#22c55e">🏆 ' + pName(winner) + '</span>' : '—'}</td>
                </tr>`;
            }).join('');

            battlesHtml = `
            <div class="data-table">
                <table>
                    <thead><tr>
                        <th>ID</th><th>Лига</th><th>Статус</th><th>Игроки</th>
                        <th>Команда 1</th><th>Команда 2</th><th>Приз</th><th>Ходы</th><th>Время</th><th>Победитель</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        } else {
            battlesHtml = '<div style="color:#4a5568;font-size:13px;padding:20px 0;text-align:center">Нет боёв</div>';
        }

        // ── ТАБЛИЦА РЕЙТИНГА ───────────────────────────────────
        if (leaderRes && leaderRes.leaderboard && leaderRes.leaderboard.length > 0) {
            const rows = leaderRes.leaderboard.map((s, i) => {
                const pct = Math.min(100, Math.round((s.rating - 0) / 25));
                const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                return `<tr>
                    <td style="font-weight:700">${rank}</td>
                    <td style="font-size:12px">${s.name || '?'} <span style="color:#4a5568;font-size:10px">Lv${s.level||1}</span></td>
                    <td>${leagueBadge(s.league)}</td>
                    <td>
                        <span style="font-weight:700;color:#a855f7">${s.rating}</span>
                        <span class="rating-bar-wrap"><span class="rating-bar-fill" style="width:${pct}%"></span></span>
                    </td>
                    <td style="color:#22c55e">${s.wins}</td>
                    <td style="color:#ef4444">${s.losses}</td>
                    <td>${s.streak > 2 ? '🔥' : ''}${s.streak}</td>
                    <td style="font-size:11px;color:#f59e0b">${(s.totalEarned||0).toLocaleString()}</td>
                </tr>`;
            }).join('');

            leaderHtml = `
            <div class="data-table">
                <table>
                    <thead><tr>
                        <th>#</th><th>Игрок</th><th>Лига</th><th>Рейтинг</th>
                        <th>🏆 Победы</th><th>💀 Пор.</th><th>🔥 Серия</th><th>Заработано</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        } else {
            leaderHtml = '<div style="color:#4a5568;font-size:13px;padding:20px 0;text-align:center">Нет данных рейтинга</div>';
        }

        main.innerHTML = `
            <div class="user-card" style="margin-bottom:0;border-radius:16px 16px 0 0;border-bottom:none;padding-bottom:8px">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
                    <h3 style="color:#38bdf8">⚔️ Арена — Мониторинг</h3>
                    <div style="display:flex;gap:8px">
                        <button class="secondary" onclick="loadArenaTab()" style="font-size:11px"><i class="fas fa-sync"></i> Обновить</button>
                        <button class="secondary" onclick="goToArenaTab(); setInterval(loadArenaTab, 10000);" style="font-size:11px;background:#0d1120">🔴 Live</button>
                    </div>
                </div>
            </div>

            <div class="user-card" style="border-radius:0;border-top:none;border-bottom:none;padding-top:0">
                ${statsHtml}
            </div>

            <div class="user-card" style="border-radius:0;border-top:none;border-bottom:none">
                <div class="arena-section-title">⚔️ Последние бои <span style="font-size:11px;color:#4a5568;font-weight:400">(50 штук)</span></div>
                ${battlesHtml}
            </div>

            <div class="user-card" style="border-radius:0 0 16px 16px;border-top:none">
                <div class="arena-section-title">🏆 Таблица рейтинга</div>
                ${leaderHtml}
            </div>
        `;
    }

</script>
</body>
</html>
