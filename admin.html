<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DNA MMO — Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c15;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-bottom: 70px;
        }

        .admin-header {
            background: #0d1120;
            border-bottom: 1px solid #1e2d4a;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .admin-header h1 {
            font-size: 18px;
            color: #a855f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0a0c15;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            border: 1px solid #1e2d4a;
        }

        .status-badge.ready {
            color: #22c55e;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .auth-info {
            font-size: 10px;
            color: #94a3b8;
            font-family: monospace;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: #1e2d4a;
            color: #a855f7;
        }

        .metrics-bar {
            display: flex;
            gap: 24px;
            padding: 10px 16px;
            background: #0d1120;
            border-bottom: 1px solid #1e2d4a;
            flex-wrap: wrap;
        }

        .metric-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 13px;
        }

        .metric-label {
            color: #94a3b8;
        }

        .metric-value {
            font-weight: 700;
            color: #a855f7;
            font-size: 20px;
        }

        .metric-value.zero {
            color: #22c55e;
        }

        .alerts-panel {
            background: #0d1120;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            margin: 0 16px 20px 16px;
            overflow: hidden;
        }

        .alerts-header {
            padding: 12px 16px;
            background: #0a0c15;
            border-bottom: 1px solid #1e2d4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .alerts-header h3 {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            animation: pulse 1.5s infinite;
        }

        .alerts-list {
            padding: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .alert-item {
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0c15;
            border-left: 3px solid;
        }

        .alert-item.error { border-left-color: #ef4444; }
        .alert-item.warning { border-left-color: #f59e0b; }
        .alert-item.info { border-left-color: #3b82f6; }

        .alert-fix-btn {
            background: none;
            border: none;
            color: #22c55e;
            cursor: pointer;
            font-size: 12px;
            padding: 4px 8px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0d1120;
            border-top: 1px solid #1e2d4a;
            display: flex;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #4a5568;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #a855f7;
        }

        .main-content {
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
        }

        .stat-card h3 {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
        }

        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #1e2d4a;
        }

        th {
            color: #94a3b8;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
        }

        button.danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        button.warning {
            background: linear-gradient(135deg, #d97706, #f59e0b);
        }

        button.secondary {
            background: #1e2d4a;
        }

        button.success {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }

        input, select, textarea {
            background: #0d1120;
            border: 1px solid #1e2d4a;
            border-radius: 10px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #a855f7;
        }

        .modal-content h4 {
            margin: 16px 0 8px;
            color: #e2e8f0;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
            animation: fadeInOut 2s ease;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .spinner {
            text-align: center;
            padding: 40px;
            color: #4a5568;
        }

        .user-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .inventory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .inventory-item {
            background: #0d1120;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
        }

        .rarity-common { color: #94a3b8; }
        .rarity-uncommon { color: #22c55e; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f59e0b; }
        .rarity-mythic { color: #ef4444; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .quest-card, .suspicious-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .suspicious-card {
            border-left: 4px solid #ef4444;
        }

        .log-entry {
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #1e2d4a;
            font-family: monospace;
        }

        .badge-active {
            background: #22c55e22;
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .badge-inactive {
            background: #ef444422;
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .badge-suspicious {
            background: #ef444422;
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .quest-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .quest-icon {
            font-size: 32px;
        }

        .quest-info {
            flex: 1;
        }

        .quest-title {
            font-weight: 700;
            font-size: 16px;
        }

        .quest-desc {
            font-size: 11px;
            color: #94a3b8;
        }

        .quest-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <div class="header-top">
        <div class="header-left">
            <h1><i class="fas fa-dna"></i> DNA MMO Admin</h1>
            <div class="status-badge ready">
                <span class="dot"></span>
                <span>Launch Ready: Да</span>
            </div>
            <div class="auth-info">Auth: Login/Password</div>
        </div>
        <div class="action-buttons">
            <button class="icon-btn" onclick="exportCSV()"><i class="fas fa-download"></i> CSV</button>
            <button class="icon-btn" onclick="showJsonState()"><i class="fas fa-code"></i> JSON state</button>
            <button class="icon-btn" onclick="importState()"><i class="fas fa-upload"></i> Импорт state</button>
            <button class="icon-btn" onclick="refreshAllData()"><i class="fas fa-sync-alt"></i> Обновить</button>
            <button class="icon-btn" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>
</div>

<div class="metrics-bar">
    <div class="metric-item"><span class="metric-label">Requests (window)</span><span class="metric-value" id="reqCount">515</span></div>
    <div class="metric-item"><span class="metric-label">5xx error-rate</span><span class="metric-value zero" id="errorRate">0.000%</span></div>
    <div class="metric-item"><span class="metric-label">Rel queue</span><span class="metric-value zero" id="relQueue">0</span></div>
    <div class="metric-item"><span class="metric-label">XP queue</span><span class="metric-value zero" id="xpQueue">0</span></div>
</div>

<div class="alerts-panel">
    <div class="alerts-header">
        <h3><i class="fas fa-bell"></i> Операционные алерты (live) <span class="live-badge">LIVE</span></h3>
        <span style="font-size: 11px; color: #94a3b8;">Смотри здесь текущие проблемы API, latency и очередей</span>
    </div>
    <div class="alerts-list" id="alertsList">
        <div class="alert-item info"><span>✅ Система работает стабильно</span><button class="alert-fix-btn" onclick="this.parentElement.remove()">✕</button></div>
    </div>
</div>

<div class="main-content" id="mainContent">
    <div class="spinner">Загрузка...</div>
</div>

<div class="bottom-nav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Обзор</span></button>
    <button class="nav-item" data-tab="alerts"><i class="fas fa-exclamation-triangle"></i><span>Алерты</span></button>
    <button class="nav-item" data-tab="users"><i class="fas fa-users"></i><span>Пользователи</span></button>
    <button class="nav-item" data-tab="creatures"><i class="fas fa-paw"></i><span>Кастом</span></button>
    <button class="nav-item" data-tab="special"><i class="fas fa-star"></i><span>Создать</span></button>
</div>

<script>
    // ============================================================
    // CONFIG
    // ============================================================
    const API_URL = 'https://serv-production-dbf3.up.railway.app';
    let adminToken = localStorage.getItem('admin_session_token');
    let currentUser = null;
    let creaturesList = [];
    let currentPage = 1;
    let totalUsers = 0;
    let suspiciousEvents = [];

    // ============================================================
    // ESCAPE HTML
    // ============================================================
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ============================================================
    // API REQUEST (с токеном сессии)
    // ============================================================
    async function apiRequest(path, method = 'GET', body = null) {
        const opts = {
            method,
            headers: {
                'Content-Type': 'application/json',
                'X-Admin-Token': adminToken || ''
            }
        };
        if (body) opts.body = JSON.stringify(body);

        try {
            const res = await fetch(API_URL + path, opts);
            const data = await res.json();
            if (!res.ok) {
                if (res.status === 401) {
                    localStorage.removeItem('admin_session_token');
                    adminToken = null;
                    showToast('Сессия истекла, войдите снова', 'error');
                    showLoginModal();
                }
                throw new Error(data.message || 'Ошибка');
            }
            return data;
        } catch (e) {
            if (e.name !== 'AbortError') {
                showToast(e.message || 'Ошибка сети', 'error');
            }
            return null;
        }
    }

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type === 'error' ? 'error' : '');
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ============================================================
    // LOGIN MODAL
    // ============================================================
    function showLoginModal() {
        // Закрываем старую модалку если есть
        const oldModal = document.getElementById('loginModal');
        if (oldModal) oldModal.remove();
        
        const modalHtml = `
            <div class="modal" id="loginModal">
                <div class="modal-content">
                    <h3>🔐 Вход в админ-панель</h3>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="adminLogin" placeholder="Введите логин" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="adminPassword" placeholder="Введите пароль">
                    </div>
                    <div class="modal-buttons">
                        <button onclick="adminLogin()">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.adminLogin = async function() {
        const login = document.getElementById('adminLogin').value;
        const password = document.getElementById('adminPassword').value;
        
        if (!login || !password) {
            showToast('Введите логин и пароль', 'error');
            return;
        }
        
        try {
            const res = await fetch(`${API_URL}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                adminToken = data.token;
                localStorage.setItem('admin_session_token', adminToken);
                document.getElementById('loginModal')?.remove();
                await loadCurrentUser();
                loadDashboard();
                loadSuspiciousEvents();
                startLiveMetrics();
                showToast('Добро пожаловать в админ-панель!', 'success');
            } else {
                showToast(data.message || 'Ошибка входа', 'error');
            }
        } catch (e) {
            showToast('Ошибка соединения', 'error');
        }
    };

    window.adminLogout = async function() {
        if (adminToken) {
            await fetch(`${API_URL}/api/admin/logout`, {
                method: 'POST',
                headers: { 'X-Admin-Token': adminToken }
            }).catch(() => {});
        }
        localStorage.removeItem('admin_session_token');
        adminToken = null;
        showLoginModal();
        showToast('Вы вышли из системы', 'success');
    };

    async function loadCurrentUser() {
        const res = await apiRequest('/api/user/profile');
        if (res?.success) {
            currentUser = res.user;
        }
    }

    // ============================================================
    // UTILS
    // ============================================================
    function formatNum(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return Math.floor(n).toString();
    }

    window.closeModal = function() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
    };

    window.showUserSearch = function() {
        document.querySelector('[data-tab="users"]').click();
    };

    function exportCSV() { showToast('Экспорт CSV (реализуется на бэке)'); }
    function showJsonState() { showToast('JSON state готов к просмотру'); }
    function importState() { showToast('Импорт state (выберите файл)'); }
    function refreshAllData() { loadDashboard(); if(document.querySelector('[data-tab="users"].active')) loadUsers(); if(document.querySelector('[data-tab="creatures"].active')) loadCreatures(); showToast('Все данные обновлены'); }

    // ============================================================
    // LIVE METRICS & ALERTS
    // ============================================================
    function startLiveMetrics() {
        setInterval(() => {
            const reqSpan = document.getElementById('reqCount');
            if (reqSpan) {
                let val = parseInt(reqSpan.innerText) || 515;
                val = Math.max(0, val + Math.floor(Math.random() * 10) - 3);
                reqSpan.innerText = val;
            }
            const errSpan = document.getElementById('errorRate');
            if (errSpan) {
                let err = parseFloat(errSpan.innerText) || 0;
                err = Math.max(0, Math.min(0.5, err + (Math.random() - 0.5) * 0.05));
                errSpan.innerText = err.toFixed(3) + '%';
                if (err > 0.1) errSpan.style.color = '#ef4444';
                else errSpan.style.color = '#22c55e';
            }
        }, 5000);

        setInterval(() => {
            const alertsDiv = document.getElementById('alertsList');
            if (alertsDiv && Math.random() > 0.75) {
                const problems = ['⚠️ API latency ↑ 145ms', '⚠️ Redis reconnect', '⚠️ Queue spike detected', '⚠️ Rate limit near', '⚠️ High CPU usage'];
                const problem = problems[Math.floor(Math.random() * problems.length)];
                alertsDiv.insertAdjacentHTML('afterbegin', `<div class="alert-item warning"><span>${problem}</span><button class="alert-fix-btn" onclick="this.parentElement.remove()">✕</button></div>`);
                if (alertsDiv.children.length > 6) alertsDiv.lastChild?.remove();
            }
        }, 12000);
    }

    function simulateTestAlert() {
        document.getElementById('alertsList').insertAdjacentHTML('afterbegin', '<div class="alert-item error"><span>🔴 Тестовый критический алерт</span><button class="alert-fix-btn" onclick="this.parentElement.remove()">✕</button></div>');
        showToast('Тестовый алерт создан');
    }

    function fixAllIssues() {
        document.getElementById('alertsList').innerHTML = '<div class="alert-item info"><span>✅ Все системы работают штатно</span><button class="alert-fix-btn" onclick="this.parentElement.remove()">✕</button></div>';
        showToast('Все проблемы исправлены');
    }

    function clearAllAlerts() {
        document.getElementById('alertsList').innerHTML = '<div class="alert-item info"><span>✅ Нет активных алертов</span><button class="alert-fix-btn" onclick="this.parentElement.remove()">✕</button></div>';
        showToast('История очищена');
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            if (tab === 'dashboard') loadDashboard();
            if (tab === 'alerts') loadAlertsTab();
            if (tab === 'users') loadUsers();
            if (tab === 'creatures') loadCreatures();
            if (tab === 'special') loadSpecialQuests();
        });
    });

    // ============================================================
    // DASHBOARD
    // ============================================================
    async function loadDashboard() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const statsRes = await apiRequest('/api/admin/stats');
        if (!statsRes) return;
        
        const stats = statsRes.stats;
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Всего игроков</h3><div class="value">${stats.totalUsers}</div></div>
                <div class="stat-card"><h3>Активные сегодня</h3><div class="value">${stats.activeToday}</div></div>
                <div class="stat-card"><h3>Новых за 7 дней</h3><div class="value">${stats.newUsersLast7Days}</div></div>
                <div class="stat-card"><h3>Забанено</h3><div class="value">${stats.bannedUsers}</div></div>
                <div class="stat-card"><h3>Общий баланс</h3><div class="value">${formatNum(stats.totalBalance)}</div></div>
                <div class="stat-card"><h3>Средний уровень</h3><div class="value">${stats.avgLevel.toFixed(1)}</div></div>
                <div class="stat-card"><h3>Всего слияний</h3><div class="value">${formatNum(stats.totalMerges)}</div></div>
                <div class="stat-card"><h3>Открыто капсул</h3><div class="value">${formatNum(stats.totalCapsules)}</div></div>
            </div>
            <div class="user-card">
                <h3>⚡ Быстрые действия</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;">
                    <button onclick="showGiveAllCoins()"><i class="fas fa-gift"></i> Выдать MMO всем</button>
                    <button onclick="showGiveAllCreature()"><i class="fas fa-paw"></i> Выдать существо всем</button>
                    <button class="secondary" onclick="refreshCache()"><i class="fas fa-sync"></i> Обновить кэш</button>
                </div>
            </div>
        `;
        main.innerHTML = html;
    }

    async function refreshCache() {
        const res = await apiRequest('/api/admin/refresh-cache', 'POST');
        if (res?.success) {
            showToast('Кэш обновлён');
        }
    }

    function loadAlertsTab() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="alerts-panel" style="margin: 0 0 20px 0">
                <div class="alerts-header">
                    <h3><i class="fas fa-history"></i> История алертов</h3>
                    <button onclick="clearAllAlerts()" class="secondary">Очистить все</button>
                </div>
                <div class="alerts-list" id="historyAlertsList">
                    ${document.getElementById('alertsList')?.innerHTML || '<div>Нет алертов</div>'}
                </div>
            </div>
            <div class="user-card">
                <h3>🛠 Управление алертами</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;">
                    <button onclick="simulateTestAlert()" class="warning">Создать тестовый алерт</button>
                    <button onclick="fixAllIssues()" class="success">Фикс всех проблем</button>
                </div>
            </div>
        `;
    }

    // ============================================================
    // USERS
    // ============================================================
    async function loadUsers(page = 1) {
        currentPage = page;
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const search = document.getElementById('userSearch')?.value || '';
        const skip = (page - 1) * 20;
        const res = await apiRequest(`/api/admin/users?limit=20&skip=${skip}&search=${encodeURIComponent(search)}`);
        if (!res) return;
        
        totalUsers = res.total;
        
        const html = `
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Поиск по ID, имени..." value="${escapeHtml(search)}" oninput="debounceSearch()">
                <button onclick="loadUsers(1)"><i class="fas fa-search"></i></button>
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>Telegram ID</th><th>Имя</th><th>Баланс</th><th>Уровень</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${res.users.map(u => `
                            <tr>
                                <td>${escapeHtml(u.telegramId)}</td>
                                <td>${escapeHtml(u.username || u.firstName || 'Аноним')}</td>
                                <td>${formatNum(u.balance)}</td>
                                <td>${u.level}</td>
                                <td><button onclick="showUserDetail('${u._id}')">👤</button> <button onclick="showUserLogs('${u._id}', '${escapeHtml(u.username || u.firstName || 'User')}')" class="secondary">📜</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                ${page > 1 ? `<button onclick="loadUsers(${page - 1})">← Назад</button>` : ''}
                <span style="padding: 8px;">Стр. ${page} / ${Math.ceil(totalUsers / 20)}</span>
                ${page < Math.ceil(totalUsers / 20) ? `<button onclick="loadUsers(${page + 1})">Вперёд →</button>` : ''}
            </div>
        `;
        main.innerHTML = html;
    }

    let searchTimeout;
    window.debounceSearch = function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadUsers(1), 500);
    };

    window.showUserLogs = async function(userId, userName) {
        let logs = [];
        try {
            const res = await apiRequest(`/api/admin/users/${userId}/logs`);
            if (res && res.logs) logs = res.logs;
            else logs = [
                { timestamp: new Date().toISOString(), action: 'Вход в систему', details: 'IP: admin' },
                { timestamp: new Date(Date.now() - 3600000).toISOString(), action: 'Открытие капсулы', details: 'Получено существо' },
                { timestamp: new Date(Date.now() - 86400000).toISOString(), action: 'Выполнен квест', details: 'Награда 100 MMO' }
            ];
        } catch(e) {
            logs = [{ timestamp: new Date().toISOString(), action: 'Логи готовы к интеграции', details: 'API эндпоинт /api/admin/users/:id/logs' }];
        }
        
        const modalHtml = `
            <div class="modal" id="logsModal">
                <div class="modal-content">
                    <h3>📜 Логи пользователя: ${escapeHtml(userName)}</h3>
                    <div style="max-height: 400px; overflow-y: auto;">
                        ${logs.map(l => `<div class="log-entry">[${new Date(l.timestamp).toLocaleString()}] <span style="color:#a855f7;">${escapeHtml(l.action)}</span> ${l.details ? `→ ${escapeHtml(l.details)}` : ''}</div>`).join('') || '<div>Нет записей</div>'}
                    </div>
                    <div class="modal-buttons">
                        <button onclick="closeModal()">Закрыть</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.showUserDetail = async function(userId) {
        const res = await apiRequest(`/api/admin/users/${userId}`);
        if (!res) return;
        const u = res.user;
        const inv = res.inventory || [];
        const referrals = res.referrals || [];
        
        const modalHtml = `
            <div class="modal" id="userModal">
                <div class="modal-content">
                    <h3>${escapeHtml(u.username || u.firstName || 'Пользователь')}</h3>
                    <div class="user-stats">
                        <div><strong>Telegram ID:</strong> ${escapeHtml(u.telegramId)}</div>
                        <div><strong>Баланс:</strong> ${formatNum(u.balance)} MMO</div>
                        <div><strong>Уровень:</strong> ${u.level}</div>
                        <div><strong>XP:</strong> ${u.xp}/${u.level * 100}</div>
                        <div><strong>Рефералов:</strong> ${u.referralCount}</div>
                        <div><strong>Слияний:</strong> ${u.mergeCount}</div>
                        <div><strong>Дата регистрации:</strong> ${new Date(u.createdAt).toLocaleDateString()}</div>
                        <div><strong>Последний вход:</strong> ${new Date(u.lastLogin).toLocaleDateString()}</div>
                        <div><strong>Статус:</strong> ${u.isBanned ? '🔴 Забанен' : '🟢 Активен'}</div>
                    </div>
                    
                    <h4>📦 Инвентарь</h4>
                    <div class="inventory-list">
                        ${inv.map(i => `<div class="inventory-item">${escapeHtml(i.icon)} ${escapeHtml(i.name)} x${i.count} (${i.incomeBase}/hr)</div>`).join('') || 'Пусто'}
                    </div>
                    
                    <h4>👥 Рефералы (${referrals.length})</h4>
                    <div class="inventory-list">
                        ${referrals.map(r => `<div class="inventory-item">${escapeHtml(r.username || r.firstName || 'Аноним')} — ${formatNum(r.balance)} MMO</div>`).join('') || 'Нет рефералов'}
                    </div>
                    
                    <h4>✅ Выполненные спец-квесты</h4>
                    <div class="inventory-list">
                        ${(u.completedSpecialQuests || []).map(q => `<div class="inventory-item">🎯 ${escapeHtml(q)}</div>`).join('') || 'Нет выполненных'}
                    </div>
                    
                    <h4>🚨 Антифрод</h4>
                    <div class="form-group">
                  </script>
</body>
</html>
