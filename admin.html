<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DNA MMO — Админ-панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0c15;
            color: #e2e8f0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding-bottom: 70px;
        }

        .admin-header {
            background: #0d1120;
            border-bottom: 1px solid #1e2d4a;
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 18px;
            color: #a855f7;
        }

        .menu-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #a855f7;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0d1120;
            border-top: 1px solid #1e2d4a;
            display: flex;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: #4a5568;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #a855f7;
        }

        .main-content {
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
        }

        .stat-card h3 {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
        }

        .data-table {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #1e2d4a;
        }

        th {
            color: #94a3b8;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 10px;
            padding: 8px 16px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        button.danger {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        button.warning {
            background: linear-gradient(135deg, #d97706, #f59e0b);
        }

        button.secondary {
            background: #1e2d4a;
        }

        button.success {
            background: linear-gradient(135deg, #16a34a, #22c55e);
        }

        input, select, textarea {
            background: #0d1120;
            border: 1px solid #1e2d4a;
            border-radius: 10px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
            width: 100%;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 16px;
            color: #a855f7;
        }

        .modal-content h4 {
            margin: 16px 0 8px 0;
            color: #e2e8f0;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
            animation: fadeInOut 2s ease;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        .spinner {
            text-align: center;
            padding: 40px;
            color: #4a5568;
        }

        .user-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .inventory-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }

        .inventory-item {
            background: #0d1120;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
        }

        .rarity-common { color: #94a3b8; }
        .rarity-uncommon { color: #22c55e; }
        .rarity-rare { color: #3b82f6; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f59e0b; }
        .rarity-mythic { color: #ef4444; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        hr {
            margin: 16px 0;
            border-color: #1e2d4a;
        }

        .quest-card {
            background: #141c2e;
            border: 1px solid #1e2d4a;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .quest-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .quest-icon {
            font-size: 32px;
        }

        .quest-info {
            flex: 1;
        }

        .quest-title {
            font-weight: 700;
            font-size: 16px;
        }

        .quest-desc {
            font-size: 11px;
            color: #94a3b8;
        }

        .quest-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .badge-active {
            background: #22c55e22;
            color: #22c55e;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        .badge-inactive {
            background: #ef444422;
            color: #ef4444;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="admin-header">
    <h1>🧬 DNA MMO Admin</h1>
    <button class="menu-btn" onclick="showUserSearch()"><i class="fas fa-search"></i></button>
</div>

<div class="main-content" id="mainContent">
    <div class="spinner">Загрузка...</div>
</div>

<div class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="dashboard"><i class="fas fa-chart-line"></i><span>Дашборд</span></button>
    <button class="nav-item" data-tab="users"><i class="fas fa-users"></i><span>Игроки</span></button>
    <button class="nav-item" data-tab="creatures"><i class="fas fa-paw"></i><span>Существа</span></button>
    <button class="nav-item" data-tab="economy"><i class="fas fa-coins"></i><span>Экономика</span></button>
    <button class="nav-item" data-tab="special-quests"><i class="fas fa-star"></i><span>Special</span></button>
</div>

<script>
    // ============================================================
    // CONFIG
    // ============================================================
    const API_URL = 'https://serv-production-dbf3.up.railway.app';
    let token = localStorage.getItem('admin_token');
    let currentUser = null;
    let creaturesList = [];
    let currentPage = 1;
    let totalUsers = 0;

    // ============================================================
    // API HELPER
    // ============================================================
    async function apiRequest(path, method = 'GET', body = null) {
        const opts = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (token) opts.headers['Authorization'] = `Bearer ${token}`;
        if (body) opts.body = JSON.stringify(body);

        try {
            const res = await fetch(API_URL + path, opts);
            const data = await res.json();
            if (!res.ok) {
                if (res.status === 401 || res.status === 403) {
                    localStorage.removeItem('admin_token');
                    token = null;
                    showToast('Сессия истекла, войдите снова', 'error');
                    showLoginModal();
                }
                throw new Error(data.message || 'Ошибка');
            }
            return data;
        } catch (e) {
            showToast(e.message, 'error');
            return null;
        }
    }

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast ' + (type === 'error' ? 'error' : '');
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // ============================================================
    // LOGIN MODAL
    // ============================================================
    function showLoginModal() {
        const modalHtml = `
            <div class="modal" id="loginModal">
                <div class="modal-content">
                    <h3>🔐 Вход в админ-панель</h3>
                    <p style="margin-bottom: 16px; font-size: 13px; color: #94a3b8;">Введите JWT токен</p>
                    <input type="password" id="adminToken" placeholder="JWT токен" />
                    <div class="modal-buttons">
                        <button onclick="login()">Войти</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    window.login = async function() {
        const inputToken = document.getElementById('adminToken').value;
        if (!inputToken) {
            showToast('Введите токен', 'error');
            return;
        }
        token = inputToken;
        localStorage.setItem('admin_token', token);
        document.getElementById('loginModal')?.remove();
        await loadCurrentUser();
        loadDashboard();
    };

    async function loadCurrentUser() {
        const res = await apiRequest('/api/user/profile');
        if (res?.success) {
            currentUser = res.user;
        }
    }

    // ============================================================
    // NAVIGATION
    // ============================================================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            if (tab === 'dashboard') loadDashboard();
            if (tab === 'users') loadUsers();
            if (tab === 'creatures') loadCreatures();
            if (tab === 'economy') loadEconomy();
            if (tab === 'special-quests') loadSpecialQuests();
        });
    });

    // ============================================================
    // DASHBOARD
    // ============================================================
    async function loadDashboard() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const statsRes = await apiRequest('/api/admin/stats');
        if (!statsRes) return;
        
        const stats = statsRes.stats;
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card"><h3>Всего игроков</h3><div class="value">${stats.totalUsers}</div></div>
                <div class="stat-card"><h3>Активные сегодня</h3><div class="value">${stats.activeToday}</div></div>
                <div class="stat-card"><h3>Новых за 7 дней</h3><div class="value">${stats.newUsersLast7Days}</div></div>
                <div class="stat-card"><h3>Забанено</h3><div class="value">${stats.bannedUsers}</div></div>
                <div class="stat-card"><h3>Общий баланс</h3><div class="value">${formatNum(stats.totalBalance)}</div></div>
                <div class="stat-card"><h3>Средний уровень</h3><div class="value">${stats.avgLevel.toFixed(1)}</div></div>
                <div class="stat-card"><h3>Всего слияний</h3><div class="value">${formatNum(stats.totalMerges)}</div></div>
                <div class="stat-card"><h3>Открыто капсул</h3><div class="value">${formatNum(stats.totalCapsules)}</div></div>
            </div>
            <div class="user-card">
                <h3>⚡ Быстрые действия</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;">
                    <button onclick="showGiveAllCoins()"><i class="fas fa-gift"></i> Выдать MMO всем</button>
                    <button onclick="showGiveAllCreature()"><i class="fas fa-paw"></i> Выдать существо всем</button>
                    <button class="secondary" onclick="refreshCache()"><i class="fas fa-sync"></i> Обновить кэш</button>
                </div>
            </div>
        `;
        main.innerHTML = html;
    }

    async function refreshCache() {
        const res = await apiRequest('/api/admin/refresh-cache', 'POST');
        if (res?.success) {
            showToast('Кэш обновлён');
        }
    }

    // ============================================================
    // USERS
    // ============================================================
    async function loadUsers(page = 1) {
        currentPage = page;
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const search = document.getElementById('userSearch')?.value || '';
        const skip = (page - 1) * 20;
        const res = await apiRequest(`/api/admin/users?limit=20&skip=${skip}&search=${encodeURIComponent(search)}`);
        if (!res) return;
        
        totalUsers = res.total;
        
        const html = `
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Поиск по ID, имени..." value="${escapeHtml(search)}" oninput="debounceSearch()">
                <button onclick="loadUsers(1)"><i class="fas fa-search"></i></button>
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>Telegram ID</th><th>Имя</th><th>Баланс</th><th>Уровень</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${res.users.map(u => `
                            <tr>
                                <td>${u.telegramId}</td>
                                <td>${escapeHtml(u.username || u.firstName || 'Аноним')}</td>
                                <td>${formatNum(u.balance)}</td>
                                <td>${u.level}</td>
                                <td><button onclick="showUserDetail('${u._id}')">👤</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                ${page > 1 ? `<button onclick="loadUsers(${page - 1})">← Назад</button>` : ''}
                <span style="padding: 8px;">Стр. ${page} / ${Math.ceil(totalUsers / 20)}</span>
                ${page < Math.ceil(totalUsers / 20) ? `<button onclick="loadUsers(${page + 1})">Вперёд →</button>` : ''}
            </div>
        `;
        main.innerHTML = html;
    }

    let searchTimeout;
    window.debounceSearch = function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadUsers(1), 500);
    };

    window.showUserDetail = async function(userId) {
        const res = await apiRequest(`/api/admin/users/${userId}`);
        if (!res) return;
        const u = res.user;
        const inv = res.inventory || [];
        const referrals = res.referrals || [];
        
        const modalHtml = `
            <div class="modal" id="userModal">
                <div class="modal-content">
                    <h3>${escapeHtml(u.username || u.firstName || 'Пользователь')}</h3>
                    <div class="user-stats">
                        <div><strong>Telegram ID:</strong> ${u.telegramId}</div>
                        <div><strong>Баланс:</strong> ${formatNum(u.balance)} MMO</div>
                        <div><strong>Уровень:</strong> ${u.level}</div>
                        <div><strong>XP:</strong> ${u.xp}/${u.level * 100}</div>
                        <div><strong>Рефералов:</strong> ${u.referralCount}</div>
                        <div><strong>Слияний:</strong> ${u.mergeCount}</div>
                        <div><strong>Дата регистрации:</strong> ${new Date(u.createdAt).toLocaleDateString()}</div>
                        <div><strong>Последний вход:</strong> ${new Date(u.lastLogin).toLocaleDateString()}</div>
                    </div>
                    
                    <h4>📦 Инвентарь</h4>
                    <div class="inventory-list">
                        ${inv.map(i => `<div class="inventory-item">${i.icon} ${i.name} x${i.count} (${i.incomeBase}/hr)</div>`).join('') || 'Пусто'}
                    </div>
                    
                    <h4>👥 Рефералы (${referrals.length})</h4>
                    <div class="inventory-list">
                        ${referrals.map(r => `<div class="inventory-item">${escapeHtml(r.username || r.firstName || 'Аноним')} — ${formatNum(r.balance)} MMO</div>`).join('') || 'Нет рефералов'}
                    </div>
                    
                    <h4>✅ Выполненные спец-квесты</h4>
                    <div class="inventory-list">
                        ${(u.completedSpecialQuests || []).map(q => `<div class="inventory-item">🎯 ${q}</div>`).join('') || 'Нет выполненных'}
                    </div>
                    
                    <h4>⚙️ Действия</h4>
                    <div class="form-group">
                        <label>Изменить баланс</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="number" id="balanceAmount" placeholder="Сумма (+/-)" style="flex:1">
                            <button onclick="changeBalance('${userId}')">Применить</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Выдать существо</label>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <select id="giveCreatureId" style="flex:2">
                                <option value="">Выберите...</option>
                                ${creaturesList.map(c => `<option value="${c.id}">${c.icon} ${c.name} (${c.rarity})</option>`).join('')}
                            </select>
                            <input type="number" id="giveCount" placeholder="Кол-во" style="width: 80px;">
                            <button onclick="giveItem('${userId}')">Выдать</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Удалить существо</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="removeCreatureId" style="flex:2">
                                <option value="">Выберите...</option>
                                ${creaturesList.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}
                            </select>
                            <input type="number" id="removeCount" placeholder="Кол-во" style="width: 80px;">
                            <button onclick="removeItem('${userId}')" class="danger">Удалить</button>
                        </div>
                    </div>
                    <div class="modal-buttons">
                        <button onclick="toggleBan('${userId}', ${!u.isBanned})" class="warning">${u.isBanned ? 'Разбанить' : 'Забанить'}</button>
                        <button onclick="resetProgress('${userId}')" class="danger">Сброс прогресса</button>
                        <button onclick="closeModal()">Закрыть</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.changeBalance = async function(userId) {
        const amount = parseInt(document.getElementById('balanceAmount')?.value);
        if (isNaN(amount)) { showToast('Введите сумму', 'error'); return; }
        const res = await apiRequest(`/api/admin/users/${userId}/balance`, 'PUT', { amount, reason: 'Админ' });
        if (res?.success) {
            showToast(`Баланс изменён на ${amount > 0 ? '+' : ''}${amount}`);
            closeModal();
            loadUsers(currentPage);
        }
    };

    window.giveItem = async function(userId) {
        const creatureId = document.getElementById('giveCreatureId')?.value;
        const count = parseInt(document.getElementById('giveCount')?.value || 1);
        if (!creatureId) { showToast('Выберите существо', 'error'); return; }
        const res = await apiRequest(`/api/admin/users/${userId}/give-item`, 'POST', { creatureId, count });
        if (res?.success) {
            showToast(`Выдано ${count} существ`);
            closeModal();
            loadUsers(currentPage);
        }
    };

    window.removeItem = async function(userId) {
        const creatureId = document.getElementById('removeCreatureId')?.value;
        const count = parseInt(document.getElementById('removeCount')?.value || 1);
        if (!creatureId) { showToast('Выберите существо', 'error'); return; }
        const res = await apiRequest(`/api/admin/users/${userId}/item`, 'DELETE', { creatureId, count });
        if (res?.success) {
            showToast(`Удалено ${count} существ`);
            closeModal();
            loadUsers(currentPage);
        }
    };

    window.toggleBan = async function(userId, ban) {
        const reason = ban ? prompt('Причина бана:') : '';
        const res = await apiRequest(`/api/admin/users/${userId}/ban`, 'PUT', { isBanned: ban, reason });
        if (res?.success) {
            showToast(ban ? 'Пользователь забанен' : 'Пользователь разбанен');
            closeModal();
            loadUsers(currentPage);
        }
    };

    window.resetProgress = async function(userId) {
        if (!confirm('Сбросить прогресс пользователя? Это действие необратимо!')) return;
        const res = await apiRequest(`/api/admin/users/${userId}/reset`, 'POST');
        if (res?.success) {
            showToast('Прогресс сброшен');
            closeModal();
            loadUsers(currentPage);
        }
    };

    // ============================================================
    // CREATURES
    // ============================================================
    async function loadCreatures() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const res = await apiRequest('/api/admin/creatures');
        if (!res) return;
        creaturesList = res.creatures;
        
        const html = `
            <div style="margin-bottom: 16px;">
                <button onclick="showAddCreatureModal()"><i class="fas fa-plus"></i> Добавить существо</button>
            </div>
            <div class="data-table">
                <table>
                    <thead>
                        <tr><th>Иконка</th><th>ID</th><th>Название</th><th>Редкость</th><th>Доход</th><th>Статус</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${res.creatures.map(c => `
                            <tr>
                                <td style="font-size: 24px;">${c.icon}</td>
                                <td><small>${c.id}</small></td>
                                <td>${c.name}</td>
                                <td class="rarity-${c.rarity}">${c.rarity}</td>
                                <td>${c.incomeBase}/hr</td>
                                <td>${c.isActive ? '✅' : '❌'}</td>
                                <td><button onclick="editCreature('${c.id}')">✏️</button> <button onclick="deleteCreature('${c.id}')" class="danger">🗑️</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        main.innerHTML = html;
    }

    window.showAddCreatureModal = function() {
        const modalHtml = `
            <div class="modal" id="creatureModal">
                <div class="modal-content">
                    <h3>➕ Добавить существо</h3>
                    <div class="form-group"><label>ID (уникальный)</label><input type="text" id="cId" placeholder="например: phoenix_legendary"></div>
                    <div class="form-group"><label>Название</label><input type="text" id="cName"></div>
                    <div class="form-group"><label>Редкость</label>
                        <select id="cRarity">
                            <option value="common">Common</option><option value="uncommon">Uncommon</option>
                            <option value="rare">Rare</option><option value="epic">Epic</option>
                            <option value="legendary">Legendary</option><option value="mythic">Mythic</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Иконка (эмодзи)</label><input type="text" id="cIcon" value="🧬" maxlength="2"></div>
                    <div class="form-group"><label>Доход в час</label><input type="number" id="cIncome" value="10"></div>
                    <div class="form-group"><label>Описание</label><textarea id="cDesc" rows="2"></textarea></div>
                    <div class="modal-buttons">
                        <button onclick="createCreature()">Создать</button>
                        <button onclick="closeModal()">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.createCreature = async function() {
        const data = {
            id: document.getElementById('cId').value,
            name: document.getElementById('cName').value,
            rarity: document.getElementById('cRarity').value,
            icon: document.getElementById('cIcon').value,
            incomeBase: parseInt(document.getElementById('cIncome').value),
            desc: document.getElementById('cDesc').value
        };
        if (!data.id || !data.name || !data.incomeBase) {
            showToast('Заполните все поля', 'error');
            return;
        }
        const res = await apiRequest('/api/admin/creatures', 'POST', data);
        if (res?.success) {
            showToast('Существо создано');
            closeModal();
            loadCreatures();
        }
    };

    window.editCreature = async function(creatureId) {
        const creature = creaturesList.find(c => c.id === creatureId);
        if (!creature) return;
        
        const modalHtml = `
            <div class="modal" id="creatureModal">
                <div class="modal-content">
                    <h3>✏️ Редактировать ${creature.name}</h3>
                    <div class="form-group"><label>Название</label><input type="text" id="cName" value="${escapeHtml(creature.name)}"></div>
                    <div class="form-group"><label>Редкость</label>
                        <select id="cRarity">
                            ${['common','uncommon','rare','epic','legendary','mythic'].map(r => `<option value="${r}" ${creature.rarity === r ? 'selected' : ''}>${r}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group"><label>Иконка</label><input type="text" id="cIcon" value="${creature.icon}" maxlength="2"></div>
                    <div class="form-group"><label>Доход в час</label><input type="number" id="cIncome" value="${creature.incomeBase}"></div>
                    <div class="form-group"><label>Описание</label><textarea id="cDesc" rows="2">${escapeHtml(creature.desc || '')}</textarea></div>
                    <div class="form-group"><label><input type="checkbox" id="cActive" ${creature.isActive ? 'checked' : ''}> Активен</label></div>
                    <div class="modal-buttons">
                        <button onclick="updateCreature('${creatureId}')">Сохранить</button>
                        <button onclick="closeModal()">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.updateCreature = async function(creatureId) {
        const data = {
            name: document.getElementById('cName').value,
            rarity: document.getElementById('cRarity').value,
            icon: document.getElementById('cIcon').value,
            incomeBase: parseInt(document.getElementById('cIncome').value),
            desc: document.getElementById('cDesc').value,
            isActive: document.getElementById('cActive').checked
        };
        const res = await apiRequest(`/api/admin/creatures/${creatureId}`, 'PUT', data);
        if (res?.success) {
            showToast('Существо обновлено');
            closeModal();
            loadCreatures();
        }
    };

    window.deleteCreature = async function(creatureId) {
        if (!confirm('Удалить существо? (нельзя удалить, если есть у игроков)')) return;
        const res = await apiRequest(`/api/admin/creatures/${creatureId}`, 'DELETE');
        if (res?.success) {
            showToast('Существо удалено');
            loadCreatures();
        }
    };

    // ============================================================
    // ECONOMY
    // ============================================================
    async function loadEconomy() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const res = await apiRequest('/api/admin/config');
        if (!res) return;
        const cfg = res.config;
        
        const html = `
            <div class="user-card">
                <h3>💰 Цены капсул</h3>
                <div class="form-group"><label>DNA Capsule</label><input type="number" id="basicCost" value="${cfg.capsuleCosts.basic}"></div>
                <div class="form-group"><label>Premium Capsule</label><input type="number" id="premiumCost" value="${cfg.capsuleCosts.premium}"></div>
            </div>
            <div class="user-card">
                <h3>🎲 Шансы выпадения (DNA Capsule)</h3>
                ${['common','uncommon','rare','epic','legendary'].map(r => `
                    <div class="form-group"><label>${r}</label><input type="number" id="basic_${r}" value="${cfg.capsuleRarities.basic[r]}">%</div>
                `).join('')}
            </div>
            <div class="user-card">
                <h3>🎲 Шансы выпадения (Premium)</h3>
                ${['common','uncommon','rare','epic','legendary'].map(r => `
                    <div class="form-group"><label>${r}</label><input type="number" id="premium_${r}" value="${cfg.capsuleRarities.premium[r]}">%</div>
                `).join('')}
            </div>
            <div class="user-card">
                <h3>📺 Реклама</h3>
                <div class="form-group"><label>Награда (MMO)</label><input type="number" id="adReward" value="${cfg.adReward}"></div>
                <div class="form-group"><label>Кулдаун (сек)</label><input type="number" id="adCooldown" value="${cfg.adCooldown}"></div>
            </div>
            <div class="user-card">
                <h3>🔧 Улучшения</h3>
                <div class="form-group"><label>Базовая стоимость</label><input type="number" id="upgradeBaseCost" value="${cfg.upgradeBaseCost}"></div>
                <div class="form-group"><label>Множитель</label><input type="number" step="0.1" id="upgradeMultiplier" value="${cfg.upgradeMultiplier}"></div>
            </div>
            <div class="user-card">
                <h3>📦 Лимиты</h3>
                <div class="form-group"><label>Макс. слотов инвентаря</label><input type="number" id="maxInventorySlots" value="${cfg.limits.maxInventorySlots}"></div>
                <div class="form-group"><label>Макс. цена в маркетплейсе</label><input type="number" id="maxMarketplacePrice" value="${cfg.limits.maxMarketplacePrice}"></div>
                <div class="form-group"><label>Макс. уровень</label><input type="number" id="maxLevel" value="${cfg.limits.maxLevel}"></div>
            </div>
            <button onclick="saveEconomy()" style="width:100%; margin-top: 16px;">💾 Сохранить все настройки</button>
        `;
        main.innerHTML = html;
    }

    window.saveEconomy = async function() {
        const data = {
            capsuleCosts: {
                basic: parseInt(document.getElementById('basicCost')?.value) || 50,
                premium: parseInt(document.getElementById('premiumCost')?.value) || 200
            },
            capsuleRarities: {
                basic: {
                    common: parseInt(document.getElementById('basic_common')?.value) || 0,
                    uncommon: parseInt(document.getElementById('basic_uncommon')?.value) || 0,
                    rare: parseInt(document.getElementById('basic_rare')?.value) || 0,
                    epic: parseInt(document.getElementById('basic_epic')?.value) || 0,
                    legendary: parseInt(document.getElementById('basic_legendary')?.value) || 0
                },
                premium: {
                    common: parseInt(document.getElementById('premium_common')?.value) || 0,
                    uncommon: parseInt(document.getElementById('premium_uncommon')?.value) || 0,
                    rare: parseInt(document.getElementById('premium_rare')?.value) || 0,
                    epic: parseInt(document.getElementById('premium_epic')?.value) || 0,
                    legendary: parseInt(document.getElementById('premium_legendary')?.value) || 0
                }
            },
            adReward: parseInt(document.getElementById('adReward')?.value) || 50,
            adCooldown: parseInt(document.getElementById('adCooldown')?.value) || 60,
            upgradeBaseCost: parseInt(document.getElementById('upgradeBaseCost')?.value) || 100,
            upgradeMultiplier: parseFloat(document.getElementById('upgradeMultiplier')?.value) || 1.5,
            limits: {
                maxInventorySlots: parseInt(document.getElementById('maxInventorySlots')?.value) || 50,
                maxMarketplacePrice: parseInt(document.getElementById('maxMarketplacePrice')?.value) || 100000,
                maxLevel: parseInt(document.getElementById('maxLevel')?.value) || 100
            }
        };
        
        const res = await apiRequest('/api/admin/config', 'PUT', data);
        if (res?.success) {
            showToast('Настройки сохранены');
        }
    };

    // ============================================================
    // SPECIAL QUESTS
    // ============================================================
    async function loadSpecialQuests() {
        const main = document.getElementById('mainContent');
        main.innerHTML = '<div class="spinner">Загрузка...</div>';
        
        const res = await apiRequest('/api/admin/special-quests');
        if (!res) return;
        
        const quests = res.specialQuests || [];
        
        const html = `
            <div style="margin-bottom: 16px;">
                <button onclick="showAddSpecialQuestModal()" class="success"><i class="fas fa-plus"></i> Добавить спец-квест</button>
            </div>
            ${quests.length === 0 ? '<div class="user-card" style="text-align:center">Нет спец-квестов. Создайте первый!</div>' : ''}
            ${quests.map(q => `
                <div class="quest-card">
                    <div class="quest-header">
                        <div class="quest-icon">${q.icon || '🎯'}</div>
                        <div class="quest-info">
                            <div class="quest-title">${escapeHtml(q.title)}</div>
                            <div class="quest-desc">${escapeHtml(q.description || '')}</div>
                        </div>
                        <div class="${q.isActive ? 'badge-active' : 'badge-inactive'}">${q.isActive ? 'Активен' : 'Отключён'}</div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; font-size: 12px; margin-bottom: 12px;">
                        <div><span style="color:#94a3b8">ID:</span> ${q.id}</div>
                        <div><span style="color:#94a3b8">Тип:</span> ${q.type}</div>
                        <div><span style="color:#94a3b8">Награда:</span> ${q.reward} MMO</div>
                        ${q.link ? `<div><span style="color:#94a3b8">Ссылка:</span> <small>${q.link.substring(0, 30)}</small></div>` : ''}
                        ${q.required_count > 1 ? `<div><span style="color:#94a3b8">Требуется:</span> ${q.required_count}</div>` : ''}
                    </div>
                    <div class="quest-actions">
                        <button onclick="editSpecialQuest('${q.id}')" class="secondary"><i class="fas fa-edit"></i> Редактировать</button>
                        <button onclick="deleteSpecialQuest('${q.id}')" class="danger"><i class="fas fa-trash"></i> Удалить</button>
                    </div>
                </div>
            `).join('')}
        `;
        main.innerHTML = html;
    }

    window.showAddSpecialQuestModal = function() {
        const modalHtml = `
            <div class="modal" id="specialQuestModal">
                <div class="modal-content">
                    <h3>✨ Добавить спец-квест</h3>
                    <div class="form-group"><label>ID (уникальный)</label><input type="text" id="sqId" placeholder="например: join_channel"></div>
                    <div class="form-group"><label>Название</label><input type="text" id="sqTitle" placeholder="Подпишись на канал"></div>
                    <div class="form-group"><label>Описание</label><textarea id="sqDesc" rows="2" placeholder="Получи награду за подписку"></textarea></div>
                    <div class="form-group"><label>Иконка (эмодзи)</label><input type="text" id="sqIcon" value="📢" maxlength="2"></div>
                    <div class="form-group"><label>Награда (MMO)</label><input type="number" id="sqReward" value="100"></div>
                    <div class="form-group"><label>Тип квеста</label>
                        <select id="sqType">
                            <option value="telegram_channel">Telegram канал</option>
                            <option value="twitter_follow">Twitter/X подписка</option>
                            <option value="youtube_sub">YouTube подписка</option>
                            <option value="custom_link">Переход по ссылке</option>
                            <option value="referral_count">Привести друзей</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Ссылка (для канала/Twitter/YouTube)</label><input type="text" id="sqLink" placeholder="https://t.me/..."></div>
                    <div class="form-group"><label>Необходимое количество (для referral_count)</label><input type="number" id="sqRequiredCount" value="1"></div>
                    <div class="form-group"><label><input type="checkbox" id="sqIsActive" checked> Активен</label></div>
                    <div class="modal-buttons">
                        <button onclick="createSpecialQuest()" class="success">Создать</button>
                        <button onclick="closeModal()">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.createSpecialQuest = async function() {
        const data = {
            id: document.getElementById('sqId').value,
            title: document.getElementById('sqTitle').value,
            description: document.getElementById('sqDesc').value,
            icon: document.getElementById('sqIcon').value,
            reward: parseInt(document.getElementById('sqReward').value),
            type: document.getElementById('sqType').value,
            link: document.getElementById('sqLink').value,
            required_count: parseInt(document.getElementById('sqRequiredCount').value) || 1,
            isActive: document.getElementById('sqIsActive').checked
        };
        
        if (!data.id || !data.title || !data.reward) {
            showToast('Заполните ID, название и награду', 'error');
            return;
        }
        
        const res = await apiRequest('/api/admin/special-quests', 'POST', data);
        if (res?.success) {
            showToast('Спец-квест создан');
            closeModal();
            loadSpecialQuests();
        }
    };

    window.editSpecialQuest = async function(questId) {
        const res = await apiRequest('/api/admin/special-quests');
        if (!res) return;
        const quest = res.specialQuests.find(q => q.id === questId);
        if (!quest) return;
        
        const modalHtml = `
            <div class="modal" id="specialQuestModal">
                <div class="modal-content">
                    <h3>✏️ Редактировать: ${quest.title}</h3>
                    <div class="form-group"><label>Название</label><input type="text" id="sqTitle" value="${escapeHtml(quest.title)}"></div>
                    <div class="form-group"><label>Описание</label><textarea id="sqDesc" rows="2">${escapeHtml(quest.description || '')}</textarea></div>
                    <div class="form-group"><label>Иконка</label><input type="text" id="sqIcon" value="${quest.icon || '🎯'}" maxlength="2"></div>
                    <div class="form-group"><label>Награда (MMO)</label><input type="number" id="sqReward" value="${quest.reward}"></div>
                    <div class="form-group"><label>Тип</label>
                        <select id="sqType">
                            <option value="telegram_channel" ${quest.type === 'telegram_channel' ? 'selected' : ''}>Telegram канал</option>
                            <option value="twitter_follow" ${quest.type === 'twitter_follow' ? 'selected' : ''}>Twitter/X подписка</option>
                            <option value="youtube_sub" ${quest.type === 'youtube_sub' ? 'selected' : ''}>YouTube подписка</option>
                            <option value="custom_link" ${quest.type === 'custom_link' ? 'selected' : ''}>Переход по ссылке</option>
                            <option value="referral_count" ${quest.type === 'referral_count' ? 'selected' : ''}>Привести друзей</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Ссылка</label><input type="text" id="sqLink" value="${escapeHtml(quest.link || '')}"></div>
                    <div class="form-group"><label>Необходимое количество</label><input type="number" id="sqRequiredCount" value="${quest.required_count || 1}"></div>
                    <div class="form-group"><label><input type="checkbox" id="sqIsActive" ${quest.isActive ? 'checked' : ''}> Активен</label></div>
                    <div class="modal-buttons">
                        <button onclick="updateSpecialQuest('${quest.id}')" class="success">Сохранить</button>
                        <button onclick="closeModal()">Отмена</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    };

    window.updateSpecialQuest = async function(questId) {
        const data = {
            title: document.getElementById('sqTitle').value,
            description: document.getElementById('sqDesc').value,
            icon: document.getElementById('sqIcon').value,
            reward: parseInt(document.getElementById('sqReward').value),
            type: document.getElementById('sqType').value,
            link: document.getElementById('sqLink').value,
            required_count: parseInt(document.getElementById('sqRequiredCount').value) || 1,
            isActive: document.getElementById('sqIsActive').checked
        };
        
        const res = await apiRequest(`/api/admin/special-quests/${questId}`, 'PUT', data);
        if (res?.success) {
            showToast('Спец-квест обновлён');
            closeModal();
            loadSpecialQuests();
        }
    };

    window.deleteSpecialQuest = async function(questId) {
        if (!confirm('Удалить спец-квест? Пользователи не смогут его выполнить.')) return;
        const res = await apiRequest(`/api/admin/special-quests/${questId}`, 'DELETE');
        if (res?.success) {
            showToast('Спец-квест удалён');
            loadSpecialQuests();
        }
    };

    // ============================================================
    // MASS ACTIONS
    // ============================================================
    window.showGiveAllCoins = function() {
        const amount = prompt('Введите количество MMO для выдачи всем игрокам:', '100');
        if (!amount) return;
        giveToAll('coins', parseInt(amount));
    };

    window.showGiveAllCreature = async function() {
        const res = await apiRequest('/api/admin/creatures');
        if (!res) return;
        
        const creatureList = res.creatures.map(c => `${c.id}|${c.icon} ${c.name}`).join(', ');
        const creatureId = prompt('Введите ID существа (например: duck_c):\n\nДоступные: ' + creatureList, 'duck_c');
        if (!creatureId) return;
        giveToAll('creature', null, creatureId);
    };

    async function giveToAll(type, amount, creatureId) {
        const res = await apiRequest('/api/admin/give-to-all', 'POST', { type, amount, creatureId });
        if (res?.success) {
            showToast(res.message);
        }
    }

    // ============================================================
    // UTILS
    // ============================================================
    window.showUserSearch = function() {
        document.querySelector('[data-tab="users"]').click();
    };

    window.closeModal = function() {
        document.querySelectorAll('.modal').forEach(m => m.remove());
    };

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function formatNum(n) {
        if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
        if (n >= 1000) return (n/1000).toFixed(1) + 'K';
        return Math.floor(n).toString();
    }

    // ============================================================
    // INIT
    // ============================================================
    if (!token) {
        showLoginModal();
    } else {
        loadCurrentUser();
        loadDashboard();
    }
</script>
